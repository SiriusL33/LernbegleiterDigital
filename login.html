<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klartext Medizin | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 selection:bg-blue-100 selection:text-blue-900">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-fade-in-up">
        <div class="bg-slate-900 p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full blur-[80px] opacity-50"></div>
            <h1 class="text-3xl font-extrabold text-white relative z-10">Klartext Medizin</h1>
            <p class="text-slate-400 mt-2 relative z-10">Digitaler Lernbegleiter</p>
        </div>

        <div class="p-8">
            <h2 id="form-title" class="text-xl font-bold text-slate-800 mb-6 text-center">Mitarbeiter Login</h2>
            
            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Benutzername</label>
                    <input type="text" id="username" required 
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        placeholder="z.B. max.mustermann">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Passwort</label>
                    <input type="password" id="password" required minlength="10"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        placeholder="•••••••• (min. 10 Zeichen, komplex)">
                </div>

                <div id="error-msg" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 p-3 rounded-lg border border-red-100"></div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all hover:-translate-y-0.5 mt-4">
                    Sicher Anmelden ➜
                </button>

                <div class="text-center mt-6">
                    <button type="button" id="toggle-mode-btn" class="text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors">
                        Noch kein Konto? <span class="text-blue-600">Hier registrieren</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/page-login.js"></script>
</body>
</html>
