<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernbegleiter Digital | Startseite</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'lb-emerald': '#2f9d82',
                        'lb-sage': '#9fbf9a',
                        'lb-beige': '#f5efe6',
                        'lb-text': 'var(--lb-text)'
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen bg-[color:var(--lb-base)] selection:bg-lb-sage selection:text-lb-emerald">

    <div id="app-header"></div>

    <header class="relative pt-28 pb-16 overflow-hidden">
        <div class="absolute inset-0 -z-10">
            <div class="absolute top-8 left-8 w-72 h-72 bg-[rgba(47,157,130,0.12)] rounded-2xl blur-3xl opacity-70"></div>
            <div class="absolute bottom-8 right-8 w-96 h-96 bg-[rgba(159,191,154,0.08)] rounded-2xl blur-3xl opacity-60"></div>
        </div>

        <div class="container mx-auto px-4 text-center max-w-4xl">
            <div class="mb-8">
                <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-slate-800 tracking-tight mb-6">
                    Lernbegleiter Digital
                </h1>
                <p class="text-xl text-slate-600 mb-8 leading-relaxed">
                    Dein persönlicher Begleiter für digitales Lernen — warm, klar und auf den Punkt.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button id="hero-primary" class="inline-flex items-center gap-3 py-4 px-8 rounded-2xl bg-gradient-to-r from-lb-emerald to-lb-sage text-white font-semibold shadow-2xl hover:scale-[1.01] transition-transform">
                    Loslegen
                </button>

                <a href="#featured" id="hero-secondary" class="inline-flex items-center gap-3 py-3 px-6 rounded-full bg-white text-lb-emerald font-medium shadow-md border border-white">
                    Mehr erfahren
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow">
        <section id="featured" class="py-20">
            <div class="container mx-auto px-4">
                <div class="text-center mb-12">
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Im Fokus</h2>
                    <p class="text-slate-500 max-w-xl mx-auto">Ausgewählte Inhalte und Impulse für dein digitales Lernen.</p>
                </div>

                <div id="featured-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="col-span-full text-center py-20 text-slate-400">Lade Inhalte...</div>
                </div>
            </div>
        </section>
    </main>

    <div id="app-footer"></div>

    <script src="assets/js/components.js"></script>
    <script src="assets/js/data-loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // UI lädt zentrale Daten, Backend-Endpunkt bleibt unverändert
            await LBApp.loadData();
            const featuredItems = LBApp.getFeatured().slice(0, 3);
            const container = document.getElementById('featured-container');

            if (featuredItems.length > 0) {
                container.innerHTML = featuredItems.map(item => LBApp.renderCard(item)).join('');
                container.querySelectorAll('.group').forEach((card, index) => {
                    card.classList.add('animate-fade-in');
                    card.style.animationDelay = `${index * 150}ms`;
                });
            } else {
                container.innerHTML = '<p class="text-center text-red-500 col-span-full">Keine Daten.</p>';
            }
        });
    </script>

    <script>
    // sanfte Interaktion: confetti bei hover bleibt, Palette angepasst
    const btnParty = document.getElementById('hero-secondary');
    if(btnParty) {
        btnParty.addEventListener('mouseenter', (e) => {
            const rect = btnParty.getBoundingClientRect();
            const x = (rect.left + rect.width / 2) / window.innerWidth;
            const y = (rect.top + rect.height / 2) / window.innerHeight;
            if (window.confetti) {
                confetti({
                    particleCount: 40,
                    spread: 50,
                    origin: { x: x, y: y },
                    colors: ['#2f9d82', '#9fbf9a', '#f5efe6'],
                    disableForReducedMotion: true,
                    scalar: 0.8
                });
            }
        });
    }
    </script>

    <script src="assets/js/catalog.js"></script>
</body>
</html>
